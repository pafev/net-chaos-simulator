# This rule is not used by the project net-chaos-simulator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants full permissions ('*') over net-chaos-simulator.pafev.dev.
# This role is intended for users authorized to modify roles and bindings within the cluster,
# enabling them to delegate specific permissions to other users or groups as needed.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: net-chaos-simulator
    app.kubernetes.io/managed-by: kustomize
  name: networkchaos-admin-role
rules:
- apiGroups:
  - net-chaos-simulator.pafev.dev
  resources:
  - networkchaos
  verbs:
  - '*'
- apiGroups:
  - net-chaos-simulator.pafev.dev
  resources:
  - networkchaos/status
  verbs:
  - get
