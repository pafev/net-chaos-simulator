# This rule is not used by the project net-chaos-simulator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants permissions to create, update, and delete resources within the net-chaos-simulator.pafev.dev.
# This role is intended for users who need to manage these resources
# but should not control RBAC or manage permissions for others.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: net-chaos-simulator
    app.kubernetes.io/managed-by: kustomize
  name: networkchaos-editor-role
rules:
- apiGroups:
  - net-chaos-simulator.pafev.dev
  resources:
  - networkchaos
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - net-chaos-simulator.pafev.dev
  resources:
  - networkchaos/status
  verbs:
  - get
